    <!-- Critical CSS: minimum needed to paint above-the-fold hero (logo, H1, subhead, CTA, dark bg).
         The full stylesheet is loaded asynchronously below. -->
    <style>
      *,*::before,*::after{box-sizing:border-box;border-width:0;border-style:solid}
      html{line-height:1.5;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
      body{margin:0;font-family:'DM Sans','DMSans-fallback',Arial,sans-serif;background-color:hsl(26 10% 4%);color:hsl(30 30% 94%);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:inherit}
      h1{font-size:inherit;font-weight:inherit;margin:0}
      img{display:block;max-width:100%;height:auto}
      button{font-family:inherit;font-size:100%;margin:0;padding:0;background:transparent;cursor:pointer;color:inherit}
      @font-face{font-family:'Fraunces-fallback';src:local('Georgia');size-adjust:105%;ascent-override:92%;descent-override:24%;line-gap-override:0%}
      @font-face{font-family:'DMSans-fallback';src:local('Arial');size-adjust:96%;ascent-override:100%;descent-override:24%;line-gap-override:0%}
      .font-display{font-family:'Fraunces','Fraunces-fallback',Georgia,serif}
      .min-h-screen{min-height:100vh}
      .editorial-bg{position:relative;background-color:hsl(26 10% 4%);background-image:radial-gradient(ellipse 80% 55% at 50% 8%,hsla(38,55%,38%,.16),transparent 60%),linear-gradient(180deg,hsl(26 10% 4%) 0%,hsl(24 12% 5%) 35%,hsl(22 14% 4%) 65%,hsl(26 10% 3%) 100%)}
      .fixed{position:fixed}.top-0{top:0}.left-0{left:0}.right-0{right:0}.z-50{z-index:50}
      .max-w-5xl{max-width:64rem}.mx-auto{margin-left:auto;margin-right:auto}
      .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.text-center{text-align:center}
      .gap-3{gap:.75rem}.gap-4{gap:1rem}
      .px-6{padding-left:1.5rem;padding-right:1.5rem}
      .pt-4{padding-top:1rem}.pt-24{padding-top:6rem}.pb-8{padding-bottom:2rem}
      @media (min-width:768px){.md\:pt-7{padding-top:1.75rem}.md\:pt-32{padding-top:8rem}}
      .w-full{width:100%}
    </style>
